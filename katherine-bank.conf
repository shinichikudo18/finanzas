<VirtualHost *:8080>
    DocumentRoot /var/www/katherine-bank
    <Directory /var/www/katherine-bank>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/katherine-bank_error.log
    CustomLog ${APACHE_LOG_DIR}/katherine-bank_access.log combined
</VirtualHost>